<!DOCTYPE html>

    <!-- Open Graph -->
    <meta property="og:site_name" content="OraOne" />
    <meta property="og:title" content="OraOne — One AI. Every Conversation." />

    <!-- Canonical (overridden per-page by useSEO) -->

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "OraOne",
      "url": "https://oraone.ai",

        "https://twitter.com/oraone_ai",
        "https://www.linkedin.com/company/oraone"
      ],
      "contactPoint": [{
        "@type": "ContactPoint",
        "email": "sales@oraone.ai",
        "telephone": "+91-98765-43210",
        "contactType": "sales",
        "areaServed": "Worldwide",
        "availableLanguage": ["English"]

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "OraOne",
      "url": "https://oraone.ai",
      "inLanguage": "en-US",
      "publisher": { "@type": "Organization", "name": "OraOne" },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://oraone.ai/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
